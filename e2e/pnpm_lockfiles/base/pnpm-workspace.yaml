packages:
    - '.'
    - '../projects/*'
    - '../vendored/*'

patchedDependencies:
    meaning-of-life@1.0.0: patches/meaning-of-life@1.0.0-pnpm.patch

# TODO: 'allowBuilds' for v11+ while remaining as 'onlyBuiltDependencies' for <=10?
allowBuilds:
    '@aspect-test/c': true
    jquery: false

# TODO: investigate
# pnpm 11 RC defaults this to true, which blocks URL-based dependencies from being used as subdependencies; the test intentionally uses a URL override for diff, so this needs to be disabled
blockExoticSubdeps: false

overrides:
    is-number: 'file:../vendored/is-number'
    diff: 'https://github.com/kpdecker/jsdiff/archive/refs/tags/v5.2.0.tar.gz'
    fsevents: '^2.3'
    typescript: '5.5.2'
    '@types/glob': '^8.1.0'
