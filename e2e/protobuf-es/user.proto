syntax = "proto3";

import "status.proto";
import "profile/profile.proto";

message User {
    string name = 1;
    status.Status status = 2;
    repeated string tags = 3;
    Profile profile = 4;
}

message GetUserRequest {
    string name = 1;
}

service UserService {
    rpc GetUser(GetUserRequest) returns (User) {}
}
